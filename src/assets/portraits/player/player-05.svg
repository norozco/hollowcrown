<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="p5stripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="8" height="8" fill="#c81e1e"/>
      <rect width="4" height="8" fill="#8a1010"/>
    </pattern>
  </defs>
  <rect width="128" height="128" fill="url(#p5stripes)"/>
  <polygon points="0,0 40,0 10,34" fill="#ffd43a" stroke="#000" stroke-width="3"/>
  <!-- leather shoulders -->
  <path d="M 8 128 L 18 98 Q 64 88 110 98 L 120 128 Z" fill="#5a3018" stroke="#000" stroke-width="3"/>
  <path d="M 44 100 L 64 112 L 84 100 L 88 128 L 40 128 Z" fill="#f0e4c0" stroke="#000" stroke-width="2.5"/>
  <!-- neck -->
  <rect x="56" y="74" width="16" height="22" fill="#f5d8b0" stroke="#000" stroke-width="2.5"/>
  <!-- face pointed chin (elf) -->
  <path d="M 38 48 Q 38 22 64 20 Q 90 22 90 48 L 88 68 Q 80 86 64 92 Q 48 86 40 68 Z" fill="#f5d8b0" stroke="#000" stroke-width="3"/>
  <!-- pointed ears -->
  <path d="M 36 56 L 28 50 L 36 64 Z" fill="#f5d8b0" stroke="#000" stroke-width="2.5"/>
  <path d="M 92 56 L 100 50 L 92 64 Z" fill="#f5d8b0" stroke="#000" stroke-width="2.5"/>
  <!-- long hair -->
  <path d="M 32 46 Q 28 16 64 12 Q 100 16 96 46 L 100 80 L 92 66 L 90 50 Q 82 36 64 34 Q 46 36 38 50 L 36 66 L 28 80 Z" fill="#1a4a2a" stroke="#000" stroke-width="3"/>
  <!-- bangs swept -->
  <path d="M 40 46 Q 56 30 72 44 Q 80 34 88 48 L 84 54 Q 76 46 72 52 Q 60 40 44 54 Z" fill="#1a4a2a" stroke="#000" stroke-width="2.5"/>
  <!-- eyes -->
  <ellipse cx="54" cy="58" rx="4.5" ry="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <ellipse cx="74" cy="58" rx="4.5" ry="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="54" cy="59" r="2.5" fill="#4a8a2a"/>
  <circle cx="74" cy="59" r="2.5" fill="#4a8a2a"/>
  <circle cx="55" cy="57" r="0.9" fill="#fff"/>
  <circle cx="75" cy="57" r="0.9" fill="#fff"/>
  <!-- thin brows -->
  <path d="M 48 50 Q 54 48 60 50" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 68 50 Q 74 48 80 50" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- nose small -->
  <path d="M 64 64 L 63 71 L 65 71 Z" fill="none" stroke="#000" stroke-width="1.4"/>
  <!-- mouth neutral -->
  <path d="M 58 78 Q 64 80 70 78" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
