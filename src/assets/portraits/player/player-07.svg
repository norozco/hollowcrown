<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="p7stripes" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <rect width="9" height="9" fill="#c81e1e"/>
      <rect width="4.5" height="9" fill="#8a0a0a"/>
    </pattern>
  </defs>
  <rect width="128" height="128" fill="url(#p7stripes)"/>
  <polygon points="0,0 36,0 4,30" fill="#ffd43a" stroke="#000" stroke-width="3"/>
  <!-- robes -->
  <path d="M 6 128 L 18 96 Q 64 88 110 96 L 122 128 Z" fill="#2a1a6a" stroke="#000" stroke-width="3"/>
  <!-- stars on robe -->
  <path d="M 32 110 l 2 4 4 0 -3 3 1 4 -4 -2 -4 2 1 -4 -3 -3 4 0 z" fill="#ffd43a" stroke="#000" stroke-width="1.2"/>
  <path d="M 92 108 l 2 4 4 0 -3 3 1 4 -4 -2 -4 2 1 -4 -3 -3 4 0 z" fill="#ffd43a" stroke="#000" stroke-width="1.2"/>
  <!-- high collar -->
  <path d="M 40 94 L 64 80 L 88 94 L 84 104 L 64 96 L 44 104 Z" fill="#4a2a8a" stroke="#000" stroke-width="2.5"/>
  <!-- neck -->
  <rect x="58" y="74" width="14" height="14" fill="#eac9a4" stroke="#000" stroke-width="2.5"/>
  <!-- face -->
  <ellipse cx="64" cy="54" rx="25" ry="30" fill="#eac9a4" stroke="#000" stroke-width="3"/>
  <!-- wizard hat / turban wrap -->
  <path d="M 34 46 Q 32 20 64 18 Q 96 20 94 46 L 90 54 Q 86 36 64 32 Q 42 36 38 54 Z" fill="#2a1a6a" stroke="#000" stroke-width="3"/>
  <path d="M 34 42 Q 64 30 94 42" stroke="#ffd43a" stroke-width="3" fill="none"/>
  <!-- front curl of hair -->
  <path d="M 42 48 Q 54 44 60 52 L 56 56 Q 48 54 44 58 Z" fill="#0a0a0a" stroke="#000" stroke-width="2"/>
  <!-- eyes -->
  <ellipse cx="54" cy="58" rx="4.5" ry="5.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <ellipse cx="74" cy="58" rx="4.5" ry="5.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="54" cy="59" r="2.3" fill="#4a2a8a"/>
  <circle cx="74" cy="59" r="2.3" fill="#4a2a8a"/>
  <circle cx="55" cy="57" r="0.9" fill="#fff"/>
  <circle cx="75" cy="57" r="0.9" fill="#fff"/>
  <!-- brows thoughtful -->
  <path d="M 48 50 Q 54 48 60 50" stroke="#000" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 68 50 Q 74 48 80 50" stroke="#000" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M 64 62 L 62 70 L 66 70 Z" fill="none" stroke="#000" stroke-width="1.6"/>
  <!-- mouth slight frown/neutral -->
  <path d="M 58 78 Q 64 76 70 78" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- earring -->
  <circle cx="39" cy="64" r="2" fill="#ffd43a" stroke="#000" stroke-width="1.5"/>
</svg>
