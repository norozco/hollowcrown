<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="p6stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(20)">
      <rect width="10" height="10" fill="#c81e1e"/>
      <rect width="5" height="10" fill="#a01818"/>
    </pattern>
  </defs>
  <rect width="128" height="128" fill="url(#p6stripes)"/>
  <polygon points="88,128 128,128 128,92 104,104" fill="#ffd43a" stroke="#000" stroke-width="3"/>
  <!-- dwarven broad shoulders -->
  <path d="M 2 128 L 10 94 Q 64 84 118 94 L 126 128 Z" fill="#3a2a1a" stroke="#000" stroke-width="3"/>
  <!-- chainmail hint -->
  <circle cx="30" cy="108" r="2.5" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
  <circle cx="40" cy="112" r="2.5" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
  <circle cx="50" cy="108" r="2.5" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
  <circle cx="78" cy="108" r="2.5" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
  <circle cx="88" cy="112" r="2.5" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
  <circle cx="98" cy="108" r="2.5" fill="none" stroke="#6a5a3a" stroke-width="1.2"/>
  <!-- face wide -->
  <path d="M 34 50 Q 34 26 64 24 Q 94 26 94 50 L 92 68 Q 82 80 64 82 Q 46 80 36 68 Z" fill="#d09868" stroke="#000" stroke-width="3"/>
  <!-- big beard -->
  <path d="M 36 66 Q 38 94 64 102 Q 90 94 92 66 Q 86 80 78 82 Q 64 78 50 82 Q 42 80 36 66 Z" fill="#8a3010" stroke="#000" stroke-width="3"/>
  <path d="M 50 84 L 48 100 M 58 88 L 58 104 M 64 90 L 64 106 M 70 88 L 70 104 M 78 84 L 80 100" stroke="#5a1808" stroke-width="1.6"/>
  <!-- wild hair -->
  <path d="M 30 42 Q 26 18 64 18 Q 102 18 98 42 L 96 56 Q 86 44 80 48 Q 72 38 64 44 Q 56 38 48 48 Q 42 44 32 56 Z" fill="#8a3010" stroke="#000" stroke-width="3"/>
  <!-- eyes small -->
  <ellipse cx="54" cy="58" rx="3.5" ry="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <ellipse cx="74" cy="58" rx="3.5" ry="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="54" cy="58" r="1.7" fill="#4a2a10"/>
  <circle cx="74" cy="58" r="1.7" fill="#4a2a10"/>
  <!-- bushy brows -->
  <path d="M 44 50 Q 54 46 62 52" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 66 52 Q 74 46 84 50" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- wide nose -->
  <path d="M 60 62 Q 64 72 68 62 L 67 70 Q 64 72 61 70 Z" fill="none" stroke="#000" stroke-width="1.8"/>
</svg>
