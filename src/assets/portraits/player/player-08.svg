<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="p8stripes" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(-15)">
      <rect width="7" height="7" fill="#c81e1e"/>
      <rect width="3.5" height="7" fill="#9a1414"/>
    </pattern>
  </defs>
  <rect width="128" height="128" fill="url(#p8stripes)"/>
  <polygon points="64,0 128,0 128,40 96,16" fill="#ffd43a" stroke="#000" stroke-width="3"/>
  <!-- leather jerkin -->
  <path d="M 8 128 L 18 98 Q 64 88 110 98 L 120 128 Z" fill="#3a2818" stroke="#000" stroke-width="3"/>
  <!-- lace-up V -->
  <path d="M 58 100 L 64 122 L 70 100" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M 58 104 L 70 104 M 59 110 L 69 110 M 60 116 L 68 116" stroke="#ffd43a" stroke-width="1.5"/>
  <!-- neck -->
  <rect x="56" y="74" width="16" height="22" fill="#d0a078" stroke="#000" stroke-width="2.5"/>
  <!-- face heart-shape -->
  <path d="M 40 46 Q 40 22 64 20 Q 88 22 88 46 L 88 64 Q 82 84 64 90 Q 46 84 40 64 Z" fill="#d0a078" stroke="#000" stroke-width="3"/>
  <!-- short messy hair -->
  <path d="M 34 44 Q 32 18 64 16 Q 96 18 94 44 L 88 52 Q 80 38 70 46 Q 64 36 58 46 Q 48 38 40 52 Z" fill="#1a1a1a" stroke="#000" stroke-width="3"/>
  <!-- eyepatch -->
  <path d="M 44 56 L 64 52 L 64 66 L 44 62 Z" fill="#1a1a1a" stroke="#000" stroke-width="2.5"/>
  <path d="M 44 58 L 30 54 M 64 54 L 78 50" stroke="#000" stroke-width="2"/>
  <!-- visible eye -->
  <ellipse cx="74" cy="60" rx="5" ry="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="74" cy="61" r="2.5" fill="#c81e1e"/>
  <circle cx="75" cy="59" r="1" fill="#fff"/>
  <!-- brow -->
  <path d="M 68 51 Q 74 48 82 51" stroke="#000" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M 64 66 L 62 74 L 66 74 Z" fill="none" stroke="#000" stroke-width="1.6"/>
  <!-- smirk -->
  <path d="M 56 80 Q 62 84 70 80 L 72 78" stroke="#000" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
