<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="p1stripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <rect width="8" height="8" fill="#c81e1e"/>
      <rect width="4" height="8" fill="#a81010"/>
    </pattern>
  </defs>
  <rect width="128" height="128" fill="url(#p1stripes)"/>
  <polygon points="0,128 128,128 128,96 0,108" fill="#ffd43a" stroke="#000" stroke-width="3"/>
  <!-- shoulders/armor -->
  <path d="M 10 128 L 18 96 Q 64 88 110 96 L 118 128 Z" fill="#2a2a2a" stroke="#000" stroke-width="3"/>
  <path d="M 40 100 L 64 112 L 88 100 L 88 128 L 40 128 Z" fill="#4a2010" stroke="#000" stroke-width="2.5"/>
  <!-- neck -->
  <rect x="56" y="74" width="16" height="22" fill="#f0c9a4" stroke="#000" stroke-width="2.5"/>
  <!-- face -->
  <ellipse cx="64" cy="56" rx="26" ry="30" fill="#f0c9a4" stroke="#000" stroke-width="3"/>
  <!-- hair back -->
  <path d="M 36 42 Q 34 20 64 18 Q 94 20 92 42 L 94 58 L 86 44 Q 64 34 42 44 L 38 58 Z" fill="#3a1a0a" stroke="#000" stroke-width="3"/>
  <!-- hair spikes/bangs -->
  <path d="M 40 46 Q 48 30 58 40 Q 66 28 74 42 Q 82 32 90 46 L 86 54 Q 78 46 70 50 Q 62 42 56 52 Q 48 44 42 54 Z" fill="#3a1a0a" stroke="#000" stroke-width="2.5"/>
  <!-- eyes -->
  <ellipse cx="54" cy="60" rx="4.5" ry="5.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <ellipse cx="74" cy="60" rx="4.5" ry="5.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <circle cx="54" cy="61" r="2.2" fill="#c81e1e"/>
  <circle cx="74" cy="61" r="2.2" fill="#c81e1e"/>
  <!-- brows -->
  <path d="M 48 52 L 60 50" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 68 50 L 80 52" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M 64 62 L 62 70 L 66 70 Z" fill="none" stroke="#000" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- mouth -->
  <path d="M 56 76 Q 64 80 72 76" stroke="#000" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
